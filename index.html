<html lang="en">
  <head>
    <title>sync-two-axes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <div class="container m-4 justify-content-start" style="max-width: 30rem; font-family: consolas">
      <form class="needs-validation was-validated" novalidation id="calc-form">
        <div class="mb-2" id="axis1-inputs">
          <span class="form-label">Axis 1</span>
          <div class="row">
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="axis1-min" class="input-group-text">Min</label>
                </div>
                <input type="number" class="form-control" id="axis1-min" name="axisOneMin" aria-label="minimum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="axis1-max" class="input-group-text">Max</label>
                </div>
                <input type="number" class="form-control" id="axis1-max" name="axisOneMax" aria-label="maximum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
          </div>
        </div>
        <div class="mb-2" id="axis2-inputs">
          <span class="form-label">Axis 2</span>
          <div class="row">
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="axis2-min" class="input-group-text">Min</label>
                </div>
                <input type="number" class="form-control" id="axis2-min" name="axisTwoMin" aria-label="minimum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="axis2-max" class="input-group-text">Max</label>
                </div>
                <input type="number" class="form-control" id="axis2-max" name="axisTwoMax" aria-label="maximum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
          </div>
        </div>
        <div class="mb-2" id="tick-inputs">
          <span class="form-label">Ticks</span>
          <div class="row">
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="ticks-min" class="input-group-text">Min</label>
                </div>
                <input type="number" class="form-control" id="ticks-min" name="ticksMin" aria-label="minimum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
            <div class="col">
              <div class="input-group">
                <div class="input-group-prepend">
                  <label for="ticks-max" class="input-group-text">Max</label>
                </div>
                <input type="number" class="form-control" id="ticks-max" name="ticksMax" aria-label="maximum" required>
                <div class="invalid-feedback">Required</div>
              </div>
            </div>
          </div>
        </div>
        <div class="my-4">
          <button class="btn btn-dark" type="submit">Calculate</button>
        </div>
      </form>
      <hr>
      <div class="my-4" id="result">
        <span class="form-label">Result</span>
        <div class="row">
          <div class="col">
            <textarea class="col-12 py-2" id="result-text" rows="5"></textarea>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script type="module" src="dist/scripts.js"></script>
  </body>
</html>
